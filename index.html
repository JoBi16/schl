

<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>إدارة المدرسة</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&display=swap" rel="stylesheet"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0b0d14;--bg2:#12151f;--bg3:#181c29;--bg4:#1e2333;--bg5:#252b3d;
  --border:#2a3147;--border2:#354060;
  --text:#e4e8f4;--text2:#8892b0;--text3:#5a6480;
  --accent:#e8a020;--accent2:#d4900e;--accent3:#fbbe50;
  --green:#2dd4a0;--green2:#1aaa7e;--red:#f05060;--blue:#4d9ef5;--purple:#9b7cf8;
  --r:10px;--shadow:0 4px 24px rgba(0,0,0,.45);--shadow2:0 8px 40px rgba(0,0,0,.6);
}
[data-theme="light"]{
  --bg:#f5f6fa;--bg2:#ffffff;--bg3:#eef0f5;--bg4:#e4e7ef;--bg5:#d9dde8;
  --border:#d0d5e2;--border2:#b8bfd0;
  --text:#1a1d2e;--text2:#505570;--text3:#787d96;
  --accent:#d4900e;--accent2:#c0800a;--accent3:#e8a020;
  --green:#16a34a;--green2:#15803d;--red:#dc2626;--blue:#2563eb;--purple:#7c3aed;
  --shadow:0 4px 24px rgba(0,0,0,.08);--shadow2:0 8px 40px rgba(0,0,0,.12);
}
html,body{height:100%;background:var(--bg);color:var(--text);
  font-family:"DM Sans",system-ui,sans-serif;font-size:16px;line-height:1.6;overflow:hidden}
html{direction:rtl}
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px}
.app{display:flex;height:100vh;width:100vw}
/* SIDEBAR */
.sidebar{width:218px;flex-shrink:0;background:var(--bg2);border-left:1px solid var(--border);
  display:flex;flex-direction:column;overflow:hidden;transition:width .25s cubic-bezier(.4,0,.2,1)}
.sidebar.collapsed{width:0;border-left-color:transparent;padding:0}
.sidebar.collapsed>*{opacity:0;pointer-events:none}
.sb-brand{padding:1rem 1.1rem .8rem;border-bottom:1px solid var(--border);
  display:flex;align-items:center;gap:.65rem}
.sb-logo{width:30px;height:30px;border-radius:7px;
  background:linear-gradient(135deg,var(--accent),var(--accent2));
  display:flex;align-items:center;justify-content:center;
  font-family:"Syne",sans-serif;font-weight:800;font-size:.7rem;color:#000;flex-shrink:0}
.sb-name{font-family:"Syne",sans-serif;font-weight:700;font-size:.84rem;color:var(--text);letter-spacing:.04em}
.sb-name span{display:block;font-size:.58rem;font-weight:400;color:var(--text3);
  letter-spacing:.06em;text-transform:uppercase;margin-top:.05rem}
.sb-nav{flex:1;padding:.4rem .55rem;overflow-y:auto;display:flex;flex-direction:column;gap:1px}
.nav-item{display:flex;align-items:center;gap:.6rem;padding:.48rem .7rem;border-radius:7px;
  cursor:pointer;color:var(--text2);font-size:.79rem;font-weight:500;transition:all .13s;
  position:relative;user-select:none;border:none;background:none;width:100%;
  text-align:right;font-family:inherit}
.nav-item:hover{background:var(--bg4);color:var(--text)}
.nav-item.active{background:rgba(232,160,32,.1);color:var(--accent);font-weight:600}
.ni-icon{font-size:.85rem;width:17px;text-align:center;flex-shrink:0}
.ni-badge{margin-right:auto;background:var(--red);color:#fff;font-size:.57rem;
  font-weight:800;padding:.06rem .35rem;border-radius:8px;min-width:17px;text-align:center;line-height:1.4}
.sb-footer{padding:.7rem .9rem;border-top:1px solid var(--border)}
.sb-user{display:flex;align-items:center;gap:.55rem}
.sb-avatar{width:28px;height:28px;border-radius:50%;
  background:linear-gradient(135deg,var(--accent),var(--accent2));
  display:flex;align-items:center;justify-content:center;
  font-weight:700;font-size:.74rem;color:#000;flex-shrink:0}
.sb-uname{font-size:.75rem;font-weight:600;line-height:1.2}
.sb-urole{font-size:.62rem;color:var(--text3)}
.sb-btns{display:flex;gap:.35rem;margin-top:.45rem}
.sb-btn{flex:1;background:none;border:1px solid var(--border);color:var(--text3);
  border-radius:5px;padding:.26rem;font-size:.68rem;cursor:pointer;font-family:inherit;transition:.13s}
.sb-btn:hover{border-color:var(--border2);color:var(--text2)}
.sb-btn.danger:hover{border-color:var(--red);color:var(--red)}
.sb-credit{font-size:.57rem;color:var(--accent);text-align:center;padding:.5rem .6rem .3rem;border-top:1px solid var(--border);margin-top:.35rem;font-weight:600;letter-spacing:.03em;opacity:.85}
/* MAIN */
.main{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0}
.topbar{height:50px;background:var(--bg2);border-bottom:1px solid var(--border);
  display:flex;align-items:center;justify-content:space-between;padding:0 1.4rem;flex-shrink:0;gap:.8rem}
.topbar-left{min-width:0}
.topbar-title{font-family:"Syne",sans-serif;font-size:.95rem;font-weight:700;color:var(--text)}
.topbar-sub{font-size:.68rem;color:var(--text3);margin-top:.03rem;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.topbar-actions{display:flex;align-items:center;gap:.5rem;flex-wrap:wrap;flex-shrink:0}
.content{flex:1;overflow-y:auto;padding:1.3rem}
/* BUTTONS */
.btn{border:none;border-radius:7px;padding:.44rem .95rem;font-weight:600;font-size:.77rem;
  cursor:pointer;font-family:inherit;transition:all .13s;white-space:nowrap;
  display:inline-flex;align-items:center;gap:.3rem}
.btn-p{background:var(--accent);color:#000}.btn-p:hover{background:var(--accent3)}
.btn-s{background:var(--bg4);color:var(--text);border:1px solid var(--border)}.btn-s:hover{background:var(--bg5)}
.btn-g{background:rgba(45,212,160,.1);color:var(--green);border:1px solid rgba(45,212,160,.22)}.btn-g:hover{background:rgba(45,212,160,.18)}
.btn-r{background:rgba(240,80,96,.1);color:var(--red);border:1px solid rgba(240,80,96,.22)}.btn-r:hover{background:rgba(240,80,96,.18)}
.btn-b{background:rgba(77,158,245,.1);color:var(--blue);border:1px solid rgba(77,158,245,.22)}.btn-b:hover{background:rgba(77,158,245,.18)}
.btn:disabled{opacity:.4;cursor:not-allowed}
/* CARDS */
.card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);padding:1.1rem}
.stat-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);padding:.95rem 1.1rem}
.stat-val{font-family:"Syne",sans-serif;font-size:1.45rem;font-weight:800;color:var(--text);line-height:1.1;margin-bottom:.18rem}
.stat-label{font-size:.63rem;text-transform:uppercase;letter-spacing:.07em;color:var(--text3);font-weight:600}
.stat-sub{font-size:.68rem;color:var(--text3);margin-top:.18rem}
.stat-card.green{border-top:2px solid var(--green)}.stat-card.amber{border-top:2px solid var(--accent)}
.stat-card.blue{border-top:2px solid var(--blue)}.stat-card.purple{border-top:2px solid var(--purple)}
.stat-card.red{border-top:2px solid var(--red)}
.stats-row{display:flex;gap:.85rem;flex-wrap:wrap;margin-bottom:1.1rem}
.stats-row .stat-card{flex:1;min-width:130px}
/* TABLE */
.hamburger{display:flex;align-items:center;justify-content:center;background:none;border:none;color:var(--text2);font-size:1.15rem;
  cursor:pointer;width:32px;height:32px;flex-shrink:0;border-radius:8px;transition:all .2s;line-height:1;position:relative}
.hamburger:hover{background:var(--bg4);color:var(--accent)}
.hamburger.sb-closed{transform:rotate(180deg)}
.sb-overlay{display:none}
.tbl-wrap{border:1px solid var(--border);border-radius:var(--r);overflow-x:auto}
.tbl{width:100%;border-collapse:collapse;font-size:.76rem}
.tbl thead{background:var(--bg3)}
.tbl th{padding:.55rem .8rem;text-align:right;color:var(--text3);font-size:.61rem;
  font-weight:700;text-transform:uppercase;letter-spacing:.06em;
  border-bottom:1px solid var(--border);white-space:nowrap}
.tbl td{padding:.55rem .8rem;border-bottom:1px solid var(--border);color:var(--text);vertical-align:middle}
.tbl tbody tr{background:var(--bg2);transition:background .1s}
.tbl tbody tr:hover{background:var(--bg3)}
.tbl tbody tr:last-child td{border-bottom:none}
/* PILLS / BADGES */
.pill{display:inline-flex;align-items:center;padding:.16rem .55rem;border-radius:20px;font-size:.63rem;font-weight:700;white-space:nowrap}
.pill-green{background:rgba(45,212,160,.12);color:var(--green)}
.pill-amber{background:rgba(232,160,32,.12);color:var(--accent)}
.pill-red{background:rgba(240,80,96,.12);color:var(--red)}
.pill-blue{background:rgba(77,158,245,.12);color:var(--blue)}
.pill-purple{background:rgba(155,124,248,.12);color:var(--purple)}
.pill-gray{background:rgba(90,100,128,.14);color:var(--text3)}
.hotel-badge{display:inline-block;padding:.13rem .5rem;border-radius:4px;font-size:.65rem;
  font-weight:700;background:rgba(77,158,245,.1);color:var(--blue);white-space:nowrap}
.canal-badge{display:inline-block;padding:.13rem .48rem;border-radius:4px;font-size:.63rem;font-weight:700}
.canal-whatsapp,.canal-zpro{background:rgba(45,212,160,.1);color:var(--green)}
.canal-telefone,.canal-voip{background:rgba(155,124,248,.1);color:var(--purple)}
.canal-email{background:rgba(232,160,32,.1);color:var(--accent)}
.canal-site,.canal-booking,.canal-agencias,.canal-outro{background:rgba(90,100,128,.12);color:var(--text2)}
.st-pendente{background:rgba(232,160,32,.12);color:var(--accent)}
.st-confirmada,.st-confirmada-pelo-gestor{background:rgba(45,212,160,.12);color:var(--green)}
.st-cancelada,.st-cancelada-pelo-gestor{background:rgba(240,80,96,.12);color:var(--red)}
.st-lead-frio{background:rgba(90,100,128,.14);color:var(--text3)}
.st-comprovante-enviado{background:rgba(77,158,245,.12);color:var(--blue)}
.proto{font-family:"Courier New",monospace;font-size:.65rem;
  background:rgba(77,158,245,.1);color:var(--blue);padding:.08rem .38rem;border-radius:3px}
.desb{font-family:"Courier New",monospace;font-size:.65rem;
  background:rgba(155,124,248,.1);color:var(--purple);padding:.08rem .38rem;border-radius:3px}
.row-atrasado{border-right:2px solid var(--accent)!important}
/* FORM */
.fg{margin-bottom:.62rem}
.fg label{display:block;font-size:.62rem;font-weight:700;color:var(--text3);
  text-transform:uppercase;letter-spacing:.06em;margin-bottom:.22rem}
.fg input,.fg select,.fg textarea{width:100%;background:var(--bg3);border:1px solid var(--border);
  color:var(--text);border-radius:6px;padding:.4rem .65rem;font-size:.8rem;font-family:inherit;transition:.13s}
.fg input:focus,.fg select:focus,.fg textarea:focus{outline:none;border-color:var(--accent);
  box-shadow:0 0 0 2px rgba(232,160,32,.08)}
.fg textarea{resize:vertical;min-height:48px}
.fg-2{display:grid;grid-template-columns:1fr 1fr;gap:.65rem}
.fg-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:.6rem}
.req{color:var(--accent);margin-right:.12rem}
.chips{display:flex;flex-wrap:wrap;gap:.3rem}
.chip{padding:.25rem .65rem;border-radius:18px;font-size:.7rem;font-weight:600;cursor:pointer;
  border:1px solid var(--border);color:var(--text2);background:var(--bg3);transition:.11s;user-select:none}
.chip:hover{border-color:var(--accent);color:var(--accent)}
.chip.sel{background:rgba(232,160,32,.11);border-color:var(--accent);color:var(--accent)}
.chips-err .chip{border-color:var(--red)!important;animation:shake .3s}
/* TOGGLE */
.toggle-row{display:flex;align-items:center;justify-content:space-between;
  padding:.52rem .78rem;background:var(--bg3);border-radius:7px;margin-bottom:.38rem}
.toggle-info{font-size:.8rem;font-weight:500}
.toggle-info small{display:block;font-size:.66rem;color:var(--text3);margin-top:.08rem}
.toggle{width:36px;height:20px;background:var(--bg5);border-radius:10px;
  position:relative;cursor:pointer;border:1px solid var(--border);transition:.18s}
.toggle-knob{width:14px;height:14px;background:var(--text3);border-radius:50%;
  position:absolute;top:2px;left:2px;transition:.18s}
.toggle.on{background:rgba(45,212,160,.14);border-color:var(--green)}
.toggle.on .toggle-knob{left:18px;background:var(--green)}
/* MODAL */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.72);z-index:1000;
  display:flex;align-items:center;justify-content:center;padding:1rem;
  backdrop-filter:blur(5px);animation:fadeIn .14s}
.modal{background:var(--bg2);border:1px solid var(--border2);border-radius:13px;
  box-shadow:var(--shadow2);width:min(640px,100%);max-height:90vh;overflow-y:auto}
.modal-sm{width:min(400px,100%)}.modal-lg{width:min(760px,100%)}
.modal-head{display:flex;align-items:center;justify-content:space-between;
  padding:1rem 1.3rem;border-bottom:1px solid var(--border);position:sticky;top:0;background:var(--bg2);z-index:1}
.modal-head h2{font-family:"Syne",sans-serif;font-size:.92rem;font-weight:700}
.modal-close{background:none;border:none;color:var(--text3);font-size:.95rem;
  cursor:pointer;padding:.18rem .38rem;border-radius:4px;transition:.13s}
.modal-close:hover{color:var(--text);background:var(--bg4)}
.modal-body{padding:1.1rem 1.3rem}
.modal-footer{display:flex;justify-content:flex-end;gap:.55rem;
  padding:.85rem 1.3rem;border-top:1px solid var(--border)}
.modal-div{border:none;border-top:1px solid var(--border);margin:.85rem 0}
/* TABS */
.tabs-bar{display:flex;border-bottom:1px solid var(--border);margin-bottom:1rem;gap:0}
.tab-btn{padding:.46rem .95rem;font-size:.72rem;font-weight:700;cursor:pointer;
  color:var(--text3);border-bottom:2px solid transparent;transition:.13s;
  background:none;border-top:none;border-left:none;border-right:none;
  font-family:inherit;text-transform:uppercase;letter-spacing:.05em}
.tab-btn:hover{color:var(--text2)}.tab-btn.on{color:var(--accent);border-bottom-color:var(--accent)}
.tab-pane{display:none}.tab-pane.on{display:block}
.subtabs{display:flex;gap:.38rem;margin-bottom:.9rem;flex-wrap:wrap}
.stab{padding:.32rem .82rem;font-size:.7rem;font-weight:700;cursor:pointer;
  color:var(--text2);border-radius:18px;border:1px solid var(--border);background:var(--bg3);
  font-family:inherit;transition:.13s}
.stab:hover{border-color:var(--border2)}.stab.on{background:rgba(232,160,32,.1);border-color:var(--accent);color:var(--accent)}
/* FILTERS */
.filters{display:flex;gap:.55rem;flex-wrap:wrap;margin-bottom:.9rem;align-items:flex-end}
.fg-f{display:flex;flex-direction:column;gap:.18rem}
.fg-f label{font-size:.6rem;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.06em}
.fg-f input,.fg-f select{background:var(--bg3);border:1px solid var(--border);color:var(--text);
  border-radius:6px;padding:.36rem .62rem;font-size:.76rem;font-family:inherit}
.fg-f input:focus,.fg-f select:focus{outline:none;border-color:var(--accent)}
.fg-f.grow{flex:1;min-width:150px}
/* LOADING */
.loading-pg{min-height:100vh;display:flex;align-items:center;justify-content:center;
  flex-direction:column;gap:.9rem;background:var(--bg)}
.spinner{width:18px;height:18px;border:2px solid var(--border);border-top-color:var(--accent);
  border-radius:50%;animation:spin .6s linear infinite;display:inline-block}
.spinner-lg{width:30px;height:30px;border-width:3px}
/* PROGRESS */
.prog-track{height:6px;background:var(--bg5);border-radius:3px;overflow:hidden}
.prog-fill{height:100%;border-radius:3px;transition:width 1.1s cubic-bezier(.4,0,.2,1)}
.prog-g{background:var(--green)}.prog-a{background:var(--accent)}.prog-p{background:var(--purple)}
/* MSGS */
.fmsg{font-size:.73rem;padding:.38rem .65rem;border-radius:5px;margin-top:.38rem}
.fmsg-ok{background:rgba(45,212,160,.1);color:var(--green);border:1px solid rgba(45,212,160,.2)}
.fmsg-err{background:rgba(240,80,96,.1);color:var(--red);border:1px solid rgba(240,80,96,.2)}
/* LOGIN */
.login-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;
  background:radial-gradient(ellipse at 25% 40%,rgba(232,160,32,.07),transparent 55%),
             radial-gradient(ellipse at 80% 80%,rgba(77,158,245,.05),transparent 50%),var(--bg)}
.login-card{background:var(--bg2);border:1px solid var(--border);border-radius:14px;
  padding:2.3rem;width:min(370px,92%);box-shadow:var(--shadow2)}
.login-brand{display:flex;align-items:center;gap:.75rem;margin-bottom:.35rem}
.login-logo{width:40px;height:40px;border-radius:9px;
  background:linear-gradient(135deg,var(--accent),var(--accent2));
  display:flex;align-items:center;justify-content:center;
  font-family:"Syne",sans-serif;font-weight:800;font-size:.85rem;color:#000}
.login-name{font-family:"Syne",sans-serif;font-weight:800;font-size:1.35rem;letter-spacing:.04em}
.login-sub{font-size:.75rem;color:var(--text3);margin-bottom:1.8rem}
/* META CARDS */
.meta-tier{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);padding:1rem;flex:1;min-width:150px}
.meta-tier.g{border-top:3px solid var(--green)}.meta-tier.a{border-top:3px solid var(--accent)}.meta-tier.p{border-top:3px solid var(--purple)}
.mt-label{font-size:.6rem;font-weight:800;text-transform:uppercase;letter-spacing:.07em;margin-bottom:.28rem}
.mt-val{font-family:"Syne",sans-serif;font-size:1.15rem;font-weight:800}
.mt-pct{font-size:.69rem;color:var(--text3);margin-top:.18rem}
.op-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);padding:1.1rem}
.op-head{display:flex;align-items:center;gap:.65rem;margin-bottom:.85rem}
.op-av{width:34px;height:34px;border-radius:50%;background:var(--bg4);
  display:flex;align-items:center;justify-content:center;font-weight:700;font-size:.85rem;flex-shrink:0}
.op-nome{font-weight:700;font-size:.84rem}.op-res{font-size:.67rem;color:var(--text3)}
.op-val{font-family:"Syne",sans-serif;font-size:1.25rem;font-weight:800;margin-bottom:.75rem}
.op-bars{display:flex;flex-direction:column;gap:.45rem}
.op-bar-row{display:flex;align-items:center;gap:.55rem}
.op-bar-lbl{font-size:.63rem;color:var(--text3);width:50px;text-align:right;flex-shrink:0}
.op-bar-track{flex:1;height:5px;background:var(--bg5);border-radius:3px;overflow:hidden}
.op-bar-fill{height:100%;border-radius:3px;transition:width 1.2s cubic-bezier(.4,0,.2,1)}
.op-premiacao{margin-top:.85rem;background:var(--bg3);border-radius:6px;padding:.5rem .75rem;font-size:.73rem}
/* HORÁRIO */
.hora-grid{display:flex;align-items:flex-end;gap:2px;height:72px;overflow-x:auto;padding-bottom:4px}
.hora-col{display:flex;flex-direction:column;align-items:center;gap:2px;flex-shrink:0;width:19px}
.hora-bar-wrap{display:flex;align-items:flex-end;height:52px}
.hora-bar{width:11px;background:var(--accent);border-radius:2px 2px 0 0;min-height:2px;opacity:.8}
.hora-lbl{font-size:.53rem;color:var(--text3)}
.hora-cnt{font-size:.56rem;color:var(--accent);font-weight:700}
.dia-grid{display:flex;align-items:flex-end;gap:4px}
.dia-col{display:flex;flex-direction:column;align-items:center;gap:2px;flex:1}
.dia-bar-wrap{display:flex;align-items:flex-end;height:65px;width:100%}
.dia-bar{width:100%;background:var(--blue);border-radius:3px 3px 0 0;min-height:2px;opacity:.8}
.dia-lbl{font-size:.63rem;color:var(--text2);font-weight:600}
.dia-cnt{font-size:.63rem;color:var(--blue);font-weight:700}
/* UPLOAD */
.upload-zone{border:2px dashed var(--border);border-radius:var(--r);padding:1.6rem;
  text-align:center;cursor:pointer;transition:.14s;background:var(--bg3)}
.upload-zone:hover{border-color:var(--accent);background:rgba(232,160,32,.04)}
.upload-zone input[type=file]{display:none}
/* ROADMAP */
.rm-col{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);overflow:hidden}
.rm-col-hdr{padding:.6rem .95rem;font-size:.63rem;font-weight:800;text-transform:uppercase;letter-spacing:.07em}
.rm-col-hdr.em-breve{background:rgba(45,212,160,.08);color:var(--green)}
.rm-col-hdr.planejado{background:rgba(77,158,245,.08);color:var(--blue)}
.rm-col-hdr.ideias{background:rgba(155,124,248,.08);color:var(--purple)}

      <td><button class="btn btn-s" style="font-size:.68rem;padding:.2rem .5rem" onclick="abrirStu('${s.id}')">✏️ تعديل</button>
        <button class="btn btn-r" style="font-size:.68rem;padding:.2rem .5rem" onclick="delStu('${s.id}')">🗑️</button></td>
    </tr>`).join("")}</tbody></table></div>`:`<div style="padding:2rem;text-align:center;color:var(--text3)">لم يتم العثور على طلاب</div>`;

window.salvarStu=function(id){

window.salvarUsr=function(id){
  const n=gv("uN"),e=gv("uE"),p=gv("uP"),r=gv("uR");if(!n||!e||!p){showMsg("uMsg","الاسم والبريد الإلكتروني وكلمة المرور مطلوبون","err");return}
  const obj={nome:n,email:e,password:p,role:r||"student",avatar:n[0].toUpperCase()};
  if(id){Object.assign(_data.users.find(u=>u.id===id),obj);}

window.delUsr=function(id){if(_data.users.length<=1||!confirm("حذف المستخدم؟"))return;_data.users=_data.users.filter(u=>u.id!==id);saveData();vUsers()};

(function initTheme(){
  const t=localStorage.getItem("scl_theme");
  if(t==="light"){document.documentElement.setAttribute("data-theme","light");}
})();
window.toggleTheme=function(){
  const h=document.documentElement;
  const isLight=h.getAttribute("data-theme")==="light";
  if(isLight){h.removeAttribute("data-theme");localStorage.setItem("scl_theme","dark");document.getElementById("themeToggle").textContent="🌙";}
  else{h.setAttribute("data-theme","light");localStorage.setItem("scl_theme","light");document.getElementById("themeToggle").textContent="☀️";}
};

// ══════════════════════════════════════
//  BOOT
// ══════════════════════════════════════
(async function boot(){
  const saved=localStorage.getItem("scl_user");
  loadData();
  if(saved){
    try{
      const user=JSON.parse(saved);
      CU=user;CR=user.role;
      renderShell();
    }catch(e){localStorage.removeItem("scl_user");CU=null;CR=null;renderLogin();}
  }else{CU=null;CR=null;renderLogin();}
})();
</script>
